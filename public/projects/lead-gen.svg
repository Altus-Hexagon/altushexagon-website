<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="60%" stop-color="#2d1f4e"/>
      <stop offset="100%" stop-color="#5b2d8e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#F9E29C"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- radar target rings -->
  <g fill="none" stroke="url(#gold)" opacity="0.9">
    <circle cx="330" cy="200" r="130" stroke-width="1.5" opacity="0.35"/>
    <circle cx="330" cy="200" r="95" stroke-width="1.5" opacity="0.5"/>
    <circle cx="330" cy="200" r="60" stroke-width="2" opacity="0.7"/>
    <circle cx="330" cy="200" r="26" stroke-width="2.5"/>
  </g>
  <circle cx="330" cy="200" r="8" fill="url(#gold)"/>

  <!-- trajectory / outreach arrow -->
  <g stroke="#F9E29C" stroke-width="3" fill="none">
    <path d="M330 200 L560 90" stroke-dasharray="6 8" opacity="0.85"/>
  </g>
  <g transform="translate(555,80) rotate(-25)">
    <path d="M0 0 L26 8 L0 16 L6 8 Z" fill="#F9E29C"/>
  </g>

  <!-- email envelope icons scattered -->
  <g opacity="0.8">
    <rect x="600" y="250" width="52" height="36" rx="4" fill="#1A1A1A" stroke="#E8E8E8" stroke-width="2"/>
    <path d="M600 252 L626 272 L652 252" stroke="#E8E8E8" stroke-width="2" fill="none"/>
  </g>
  <g opacity="0.6">
    <rect x="120" y="90" width="40" height="28" rx="3" fill="#1A1A1A" stroke="#F9E29C" stroke-width="2"/>
    <path d="M120 92 L140 106 L160 92" stroke="#F9E29C" stroke-width="1.8" fill="none"/>
  </g>
</svg>
